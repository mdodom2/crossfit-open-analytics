version: 2

models:
  - name: gold_fct_open_workout_scores
    description: "Atomic event-level fact table capturing athlete workout performance for the CrossFit Open. Each row represents a single athlete result for a specific workout within a competition context. This is the foundational fact in the gold layer and supports downstream aggregates such as the leaderboard."
    columns:
      - name: athlete_workout_sk
        description: "Surrogate key for the athlete-workout fact row."
        tests:
          - not_null
          - unique

      - name: athlete_sk
        description: "Foreign key to gold_dim_athlete."
        tests:
          - not_null

      - name: competition_sk
        description: "Foreign key to gold_dim_competition."
        tests:
          - not_null

      - name: workout_sk
        description: "Foreign key to gold_dim_workout."
        tests:
          - not_null

      - name: athlete_key
        description: "Business key for athlete."

      - name: competition_key
        description: "Business key for competition slice."

      - name: workout_key
        description: "Business key for workout."

      - name: athlete_workout_key
        description: "Business key for the athlete-workout grain."

      - name: overall_rank
        description: "Athlete overall rank within the competition slice, carried from source for downstream leaderboard derivation."

      - name: overall_score
        description: "Athlete overall score within the competition slice, carried from source for downstream leaderboard derivation."

      - name: workout_number
        description: "Workout ordinal from source."

      - name: workout_rank
        description: "Rank for the individual workout result."

      - name: workout_score_raw
        description: "Raw workout score value from source."

      - name: workout_score_display
        description: "Human-readable workout score display from source."

      - name: time_seconds
        description: "Workout time in seconds when present."

      - name: score_identifier
        description: "Score identifier from source payload."

      - name: is_valid
        description: "Whether the workout result is marked valid."

      - name: has_video
        description: "Whether the workout result has an associated video."

      - name: judge_user_id
        description: "Judge user identifier from source payload."

      - name: judge_name
        description: "Judge name from source payload."

      - name: workout_affiliate_name
        description: "Affiliate name associated with the workout submission."

      - name: SRC_CRT_TS
        description: "Timestamp when record was created in the source landing process."

      - name: SRC_UPD_TS
        description: "Timestamp when record was updated in the source landing process."

      - name: SRC_SYS
        description: "Source system identifier."

      - name: CRT_TS
        description: "Timestamp when record was created in the gold fact table."

      - name: UPD_TS
        description: "Timestamp when record was updated in the gold fact table."

  - name: gold_agg_open_leaderboard
    description: "Derived aggregate table representing rolled-up CrossFit Open leaderboard results. Each row represents one athlete within one competition slice and is sourced from the atomic workout event fact."
    columns:
      - name: leaderboard_sk
        description: "Primary surrogate key for the leaderboard record."
        tests:
          - not_null
          - unique

      - name: athlete_sk
        description: "Foreign key to gold_dim_athlete."
        tests:
          - not_null

      - name: competition_sk
        description: "Foreign key to gold_dim_competition."
        tests:
          - not_null

      - name: overall_rank
        description: "Final leaderboard rank for the athlete within the competition slice."

      - name: overall_score
        description: "Total competition score for the athlete within the competition slice."

      - name: SRC_CRT_TS
        description: "Earliest source create timestamp represented in the aggregated leaderboard record."

      - name: SRC_UPD_TS
        description: "Latest source update timestamp represented in the aggregated leaderboard record."

      - name: SRC_SYS
        description: "Source system identifier."

      - name: CRT_TS
        description: "Timestamp when record was created in the gold aggregate table."

      - name: UPD_TS
        description: "Timestamp when record was updated in the gold aggregate table."